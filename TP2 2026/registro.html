<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Cine Las Tipas</title>
</head>
<body>

    <header>
        <h1>Cine Las Tipas - San Francisco</h1>
        <img src="img/logoooo.jpg" alt="Logo" width="30%">
    </header>



    <main>
        <h2>Formulario de Inscripción</h2>
        
        <form action="#" method="POST">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required> 
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required> 
            <br><br>

            <label for="pass">Contraseña:</label>
            <input type="password" id="pass" name="pass" required> 
            <br><br>

            <label for="genero">Género favorito:</label>
            <select id="genero" name="genero">
                <option value="terror">Terror</option>
                <option value="accion">Acción</option>
                <option value="comedia">Comedia</option>
            </select>
            <br><br>

            <p>Tipo de membresía:</p>
            <input type="radio" id="gratis" name="tipo" value="gratis" checked> [Suscripción]
            <label for="gratis">Gratuita</label>
            <input type="radio" id="vip" name="tipo" value="vip"> [Suscripción]
            <label for="vip">VIP</label>
            <br><br>

            <button type="submit">Registrarse</button> [San Francisco]
        </form>
    </main>

    <footer>
        <p>Copyright 2026 - Comunidad Popera</p> [Argentina 2026]
    </footer>

</body>
</html>
